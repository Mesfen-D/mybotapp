<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>የንድፍ ትዕዛዝ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Modern CSS Style matching Telegram Dark Mode */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #18222d);
            color: var(--tg-theme-text-color, #ffffff);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 100%;
            margin: 0 auto;
        }
        h1 {
            font-size: 22px;
            text-align: center;
            margin-bottom: 25px;
            color: var(--tg-theme-text-color, #ffffff);
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: var(--tg-theme-hint-color, #8b9eb0);
        }
        select, input, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid transparent;
            border-radius: 12px;
            background-color: var(--tg-theme-secondary-bg-color, #242f3d);
            color: var(--tg-theme-text-color, #ffffff);
            box-sizing: border-box;
            font-family: inherit;
            font-size: 16px;
            transition: all 0.2s ease;
        }
        select:focus, input:focus, textarea:focus {
            outline: none;
            border-color: var(--tg-theme-button-color, #3390ec);
            box-shadow: 0 0 0 2px rgba(51, 144, 236, 0.2);
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            background-color: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 30px;
            transition: background-color 0.2s;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .conditional-field {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ምን ማዘዝ ይፈልጋሉ?</h1>
        <div class="form-group">
            <label for="design_type">የንድፍ ዓይነት</label>
            <select id="design_type" onchange="handleTypeChange()">
                <option value="logo">ሎጎ (Logo)</option>
                <option value="banner">ባነር (Banner)</option>
                <option value="social_post">ለማህበራዊ ፖስት (Social Post)</option>
                <option value="youtube_thumbnail">የዩቲዩብ ተምኔል (YouTube Thumbnail)</option>
                <option value="business_card">ቢዝነስ ካርድ (Business Card)</option>
                <option value="other">ሌላ (Other)</option>
            </select>
        </div>

        <div id="company_name_group" class="form-group conditional-field">
            <label for="company_name">የድርጅት ስም / Company Name</label>
            <input type="text" id="company_name" placeholder="ድርጅትዎን ያስገቡ">
        </div>

        <div id="contact_details_group" class="form-group conditional-field">
            <label for="contact_details">የመገናኛ አድራሻ / Contact Info</label>
            <input type="text" id="contact_details" placeholder="ስልክ, ኢሜል...">
        </div>

        <div id="color_preference_group" class="form-group conditional-field">
            <label for="color_preference">የሚመርጡት ቀለማት / Preferred Colors</label>
            <input type="text" id="color_preference" placeholder="ለምሳሌ: ቀይ እና ሰማያዊ">
        </div>
        
        <div class="form-group">
            <label for="instructions">ተጨማሪ መመሪያዎች / Additional Instructions</label>
            <textarea id="instructions" placeholder="ስለ ንድፉ ዝርዝር መረጃ እዚህ ይጻፉ..."></textarea>
        </div>

        <button id="mainBtn" class="btn" onclick="sendOrder()">ትዕዛዝ ላክ</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
