<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>የንድፍ ትዕዛዝ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Premium Black and Gold Theme */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 100%;
            margin: 0 auto;
        }
        h1 {
            font-size: 24px;
            text-align: center;
            margin-bottom: 25px;
            color: #D4AF37;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #D4AF37;
        }
        select, input[type="text"], textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #333;
            border-radius: 8px;
            background-color: #1a1a1a;
            color: #ffffff;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        select:focus, input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: #D4AF37;
            box-shadow: 0 0 5px rgba(212, 175, 55, 0.3);
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #D4AF37, #AA8529);
            color: #121212;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 30px;
            transition: opacity 0.2s;
            text-transform: uppercase;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .conditional-field {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .notice {
            margin-top: 25px;
            padding: 15px;
            background-color: rgba(212, 175, 55, 0.1);
            border: 2px solid #D4AF37;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            line-height: 1.6;
            color: #D4AF37;
            text-align: center;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.15);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ምን ማዘዝ ይፈልጋሉ?</h1>
        <div class="form-group">
            <label for="design_type">የንድፍ ዓይነት</label>
            <select id="design_type" onchange="handleTypeChange()">
                <option value="logo">ሎጎ (Logo)</option>
                <option value="banner">ባነር (Banner)</option>
                <option value="social_post">ለማህበራዊ ፖስት (Social Post)</option>
                <option value="youtube_thumbnail">የዩቲዩብ ተምኔል (YouTube Thumbnail)</option>
                <option value="business_card">ቢዝነስ ካርድ (Business Card)</option>
                <option value="other">ሌላ (Other)</option>
            </select>
        </div>

        <div id="company_name_group" class="form-group conditional-field">
            <label for="company_name">የድርጅት ስም / Company Name</label>
            <input type="text" id="company_name" placeholder="ድርጅትዎን ያስገቡ">
        </div>

        <div id="contact_details_group" class="form-group conditional-field">
            <label for="contact_details">የመገናኛ አድራሻ / Contact Info</label>
            <input type="text" id="contact_details" placeholder="ስልክ, ኢሜል...">
        </div>

        <div id="color_preference_group" class="form-group conditional-field">
            <label for="color_preference">የሚመርጡት ቀለማት / Preferred Colors</label>
            <input type="text" id="color_preference" placeholder="ለምሳሌ: ጥቁር እና ወርቃማ">
        </div>
        
        <div class="form-group">
            <label for="instructions">ተጨማሪ መመሪያዎች / Additional Instructions</label>
            <textarea id="instructions" placeholder="ስለ ንድፉ ዝርዝር መረጃ እዚህ ይጻፉ..."></textarea>
        </div>

        <button id="mainBtn" class="btn" onclick="sendOrder()">ትዕዛዝ ላክ</button>

        <div class="notice">
            📝 ማስታወሻ፦ ለዲዛይኑ የሚገቡ ምስሎች ወይም ማሳያ የሚሆኑ ፎቶዎች ካሉዎት፣ እንዲሁም በድምፅ መልእክት ማስቀመጥ ከፈለጉ ይህን ገፅ ጨርሰው መረጃውን ከላኩ በኋላ ቦቱ ላይ ቀጥታ ማስገባት ይችላሉ።
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
